<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liga Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="shell">
    <main class="page admin-page">
      <section class="panel glass header-row">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Feladatkezelés</h1>
          <p class="lede compact">
            Hozz létre és módosíts feladatokat, töltsd le a nyomtatható
            QR-kódjukat, és exportáld a feltöltött naplókat ZIP fájlban.
          </p>
        </div>
        <button class="button ghost hidden" id="logout-button" type="button">
          Kijelentkezés
        </button>
      </section>

      <section id="login-panel" class="panel auth-panel">
        <h2>Admin belépés</h2>
        <form id="login-form" class="stack">
          <label class="field">
            <span>Felhasználónév</span>
            <input id="admin-username" autocomplete="username" />
          </label>
          <label class="field">
            <span>Jelszó</span>
            <input id="admin-password" type="password" autocomplete="current-password" />
          </label>
          <button class="button primary" type="submit">Belépés</button>
        </form>
      </section>

      <section id="dashboard" class="hidden">
        <section class="panel">
          <h2>Új feladat</h2>
          <form id="task-form" class="grid two compact-grid">
            <label class="field">
              <span>Feladat neve</span>
              <input id="task-name" required placeholder="3. feladat" />
            </label>
            <label class="field">
              <span>Feladat dátuma</span>
              <input id="task-date-input" required type="date" />
            </label>
            <label class="field">
              <span>Bejelentkezés módja</span>
              <select id="checkin-validation">
                <option value="open">QR/link alapján, helyellenőrzés nélkül</option>
                <option value="gps">QR-kód vagy GPS hely alapján</option>
              </select>
            </label>
            <label class="field gps-field">
              <span>GPS szélesség</span>
              <input
                id="checkin-latitude"
                type="number"
                step="0.000001"
                min="-90"
                max="90"
                placeholder="47.123456"
              />
            </label>
            <label class="field gps-field">
              <span>GPS hosszúság</span>
              <input
                id="checkin-longitude"
                type="number"
                step="0.000001"
                min="-180"
                max="180"
                placeholder="19.123456"
              />
            </label>
            <label class="field gps-field">
              <span>Sugár méterben</span>
              <input
                id="checkin-radius"
                type="number"
                step="1"
                min="10"
                max="10000"
                placeholder="150"
              />
            </label>
            <button class="button primary" type="submit">Feladat létrehozása</button>
          </form>
        </section>

        <section class="panel">
          <div class="section-header">
            <h2>Feladatok</h2>
            <button class="button ghost" id="refresh-button" type="button">Frissítés</button>
          </div>
          <div id="tasks-list" class="task-list"></div>
        </section>
      </section>

      <section class="panel">
        <h2>Üzenetek</h2>
        <div id="admin-flash" class="flash muted">Várakozás admin műveletre.</div>
      </section>
    </main>

    <script src="/admin.js" defer></script>
  </body>
</html>
