<!doctype html>
<html lang="hu">

    <title>XC Liga Bejelentkezés</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="shell">
    <main class="page page-home">
      <section class="hero-card">
        <p class="eyebrow">Siklóernyős XC Liga</p>
        <h1>Olvasd be a feladat QR-kódját, majd töltsd fel a repülési naplót.</h1>
        <p class="lede">
          A pilótáknak csak a rajtszámukra és egy <code>.igc</code> fájlra van
          szükségük. Az admin feladatlinket hozhat létre, QR-kódot tölthet le,
          és ZIP-ben exportálhatja a naplófájlokat.
        </p>
        <div class="actions">
          <a class="button primary" href="/admin">Admin felület</a>
          <a class="button secondary" href="/health">Állapotellenőrzés</a>
        </div>
      </section>
